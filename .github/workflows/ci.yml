name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      target_sha:
        description: "Exact 40-character commit SHA to verify"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.target_sha || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify package / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22, 24]

    steps:
      - name: Validate manual target SHA
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          INPUT_TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          if [[ ! "$INPUT_TARGET_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "target_sha must be a 40-character commit SHA" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_sha || github.sha }}
          persist-credentials: false

      - name: Confirm manual checkout SHA
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          INPUT_TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [[ "$actual_sha" != "$INPUT_TARGET_SHA" ]]; then
            echo "checked out $actual_sha, expected $INPUT_TARGET_SHA" >&2
            exit 1
          fi

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Verify package
        run: npm run verify

  budget-isolation:
    name: Budget isolation gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Budget isolation gate tests
        run: node scripts/test-check-budget-isolation.mjs

      - name: Enforce budget/content PR isolation
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/check-budget-isolation.mjs --base "$BASE_SHA" --head "$HEAD_SHA"
