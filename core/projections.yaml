# Canonical source-to-runtime projection ledger for ddalggak.
source_root: ddalggak
projection_roots:
  codex:
    root: .codex/skills/ddalggak
    runtime: codex
    generated: false
    verifier_required: true
  claude:
    root: ddalggak
    runtime: claude
    generated: false
    verifier_required: true
parity_targets:
  hermes:
    runtime: hermes
    generated: false
    execution_runtime: false
    # Declared parity target only: verify-projections.mjs guards this
    # declaration's invariants (execution_runtime stays false, hermes.yaml
    # contract shape) but no script verifies actual hermes parity.
    status: aspirational
    verified: false
# Per-file parity class ledger across the two projection roots.
# Classes:
# - must-match: byte-identical in both roots.
# - may-localize: present in both roots; bodies may be language-localized, but
#   admission header fields (Use when / Required by / Side effects /
#   Do not use when) must stay identical when present.
# - root-specific: exists only in the declared root; requires root and reason.
# Any file found in either root but missing from this ledger fails
# scripts/verify-projections.mjs.
parity_ledger:
  - path: SKILL.md
    class: may-localize
  - path: references/2026-06-04-brain-v0-wiki-authority-in-ddalggak.md
